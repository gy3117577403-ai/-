# 推送到 main/master 后构建镜像并推送至阿里云 ACR（或其它 Registry）
# 需在仓库 Settings → Secrets 中配置：
#   REGISTRY_URL      例如 registry.cn-hangzhou.aliyuncs.com
#   REGISTRY_USERNAME  ACR 用户名
#   REGISTRY_PASSWORD  ACR 密码或临时令牌
#   IMAGE_NAME         完整镜像名（不含标签），例如 namespace/uss-ai
# 可选：
#   SEALOS_WEBHOOK_URL  Sealos 应用更新 Webhook，推送成功后 POST 触发拉取新镜像

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master

env:
  IMAGE_TAG: latest

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/${{ secrets.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Post-push notice
        run: echo "Push successful, await Sealos update"

      - name: Trigger Sealos webhook (optional)
        env:
          SEALOS_WEBHOOK_URL: ${{ secrets.SEALOS_WEBHOOK_URL }}
        run: |
          if [ -n "$SEALOS_WEBHOOK_URL" ]; then
            curl -fsS -m 60 -X POST "$SEALOS_WEBHOOK_URL" || echo "Webhook 调用失败，请手动在 Sealos 触发更新"
          else
            echo "未配置 SEALOS_WEBHOOK_URL，跳过 Webhook"
          fi
