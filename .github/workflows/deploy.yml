# 推送到 main/master 后构建镜像并推送至阿里云 ACR（个人版实例）
# 需在仓库 Settings → Secrets 中配置：
#   ALIYUN_USERNAME  ACR 登录用户名
#   ALIYUN_PASSWORD  ACR 登录密码或临时令牌
# 可选：
#   SEALOS_WEBHOOK_URL  Sealos 应用更新 Webhook，推送成功后 POST 触发拉取新镜像
# redeploy-stamp: init（运行 ./redeploy.sh 可更新本行以强制触发 Actions）

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-2acb2dabuutklbx4.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: "crpi-2acb2dabuutklbx4.cn-hangzhou.personal.cr.aliyuncs.com/zhiju-b/uss-app:v9"
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Post-push notice
        run: echo "Push successful, await Sealos update"

      - name: Trigger Sealos webhook (optional)
        env:
          SEALOS_WEBHOOK_URL: ${{ secrets.SEALOS_WEBHOOK_URL }}
        run: |
          if [ -n "$SEALOS_WEBHOOK_URL" ]; then
            curl -fsS -m 60 -X POST "$SEALOS_WEBHOOK_URL" || echo "Webhook 调用失败，请手动在 Sealos 触发更新"
          else
            echo "未配置 SEALOS_WEBHOOK_URL，跳过 Webhook"
          fi
